<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deploy Pipeline Test</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    h1 { color: #222; }
    .card { background: #f5f5f5; border-left: 4px solid #4f8ef7; border-radius: 4px; padding: 14px 18px; margin: 16px 0; }
    .label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 6px; }
    .value { font-size: 15px; color: #222; margin: 0; }
    .error { color: #e33; }
  </style>
</head>
<body>
  <h1>Deploy Pipeline Test</h1>

  <div class="card">
    <div class="label">Frontend</div>
    <p class="value">Hello from Frontend</p>
  </div>

  <div class="card">
    <div class="label">Env &mdash; PUBLIC_TEST_VAR</div>
    <p class="value" id="public-var">__PUBLIC_TEST_VAR__</p>
  </div>

  <div class="card">
    <div class="label">Backend &mdash; /api/hello</div>
    <p class="value" id="api-message">Loading&hellip;</p>
    <p class="value" id="api-secret"></p>
  </div>

  <div class="card">
    <div class="label">Supabase &mdash; /api/db</div>
    <p class="value" id="db-status">Loading&hellip;</p>
    <p class="value" id="db-project"></p>
  </div>

  <script>
    fetch('/api/hello')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        document.getElementById('api-message').textContent = data.message;
        document.getElementById('api-secret').textContent = 'SECRET_TEST_VAR: ' + data.secret;
      })
      .catch(function(err) {
        document.getElementById('api-message').className = 'value error';
        document.getElementById('api-message').textContent = 'Error: ' + err.message;
      });

    fetch('/api/db')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var el = document.getElementById('db-status');
        if (data.connected) {
          el.textContent = 'Connected (HTTP ' + data.status + ')';
          el.style.color = '#1a7f37';
          document.getElementById('db-project').textContent = data.project;
        } else {
          el.textContent = 'Failed: ' + (data.error || data.status);
          el.className = 'value error';
        }
      })
      .catch(function(err) {
        document.getElementById('db-status').className = 'value error';
        document.getElementById('db-status').textContent = 'Error: ' + err.message;
      });
  </script>
</body>
</html>
